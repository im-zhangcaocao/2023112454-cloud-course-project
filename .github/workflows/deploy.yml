name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  SWR_ORG: ${{ secrets.SWR_ORG }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: cn-north-4@${{ secrets.SWR_AK }}
          password: ${{ secrets.SWR_SK }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: |
            ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/backend:${{ env.IMAGE_TAG }}
            ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/frontend:latest

  deploy-to-cce:
    name: Deploy to CCE Cluster
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update Backend Image Tag
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/backend:${{ env.IMAGE_TAG }} \
            --namespace=default

      - name: Update Frontend Image Tag
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/frontend:${{ env.IMAGE_TAG }} \
            --namespace=default

      - name: Verify Deployment Rollout
        run: |
          kubectl rollout status deployment/backend --namespace=default --timeout=120s
          kubectl rollout status deployment/frontend --namespace=default --timeout=120s

      - name: Verify Pods Running
        run: |
          kubectl get pods -n default
          kubectl get svc -n default