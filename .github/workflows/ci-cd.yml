name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BACKEND_IMAGE: swr.cn-east-3.myhuaweicloud.com/zxy2023112454/backend
  FRONTEND_IMAGE: swr.cn-east-3.myhuaweicloud.com/zxy2023112454/frontend
  TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Huawei Cloud SWR
        run: |
          echo "${{ secrets.SWR_PASSWORD }}" | docker login -u "${{ secrets.SWR_USERNAME }}" --password-stdin "swr.cn-east-3.myhuaweicloud.com"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ env.TAG }}
          platforms: linux/amd64
          provenance: false

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ env.TAG }}
          platforms: linux/amd64
          provenance: false

  update-deployment:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Download and install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.34.1/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Setup kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update backend image
        run: |
          kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ env.TAG }} -n default

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ env.TAG }} -n default

      - name: Check rollout status
        run: |
          kubectl rollout status deployment/backend -n default